name: Build
run-name: "Build (${{ github.sha }})"

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          echo "::group::Build Info"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "::endgroup::"
          echo "Building application..."
          sleep 3
          echo "Build complete!"
